39a9740a619f6.js\",\"/_next/static/chunks/a5243c838c076070.js\"],\"default\"]\n14:T68b,"])</script><script>self.__next_f.push([1,"Dok sam čekao da počne rukometna utakmica u četvrtak i da frend pošalje popis igrača, a onda i prve fotke za odabir/obradu/metadata/upload išao sam još jednom isprobati mogućnosti Cursora. Naime kad se fotke šalju na agencije, svaka ima neka svoja pravila oko descriptiona, popisa igrača i sl. ali za svaku treba ispravan popis igrača. Idealno bi bilo kad bi popisi bili dostupni za download što prije, ali obično to nije tako. Neke organizacije ih nikad ni neće staviti, neke će tek nakon utakmice, neke će fotografima dati samo isprintani popis pa bi oni na terenu to trebali pretipkavati i formatirati kao da im nije dosta posla oko samog fotkanja i obrade. E kako mi je već dopizdio taj glup i dosadan, ali ključni posao pretipkavanja i formatiranja popisa igrača za Code Replacement u Photo Mechanicu probao sam natjerati Cursor da mi napravi mali desktop app koji bi mi olakšao taj posao. Frend je mobitelom ufotkao i poslao mi na WhatsApp popis. E sad sam ja taj popis otvorio u Photos appu (Mac OS) koji je onda mogao iskopirati tekst sa fotke i njega sam ubacio u svoju novu aplikaciju. I gle čuda, stvar radi. Dobijem popis kojeg još mogu doraditi ako vidim da je nešto krivo i automatsku mogućnost downloada filea koji je spreman za Code Replacement u Photo Mechanicu. Dodao sam i mogućnost čišćenje dijakritika jer neke agencije ih ne žele. Tu je i glavni Description za par agencija. Čini mi se zgodno i meni dosta korisno pa sam i nju digao online. Ako vidim neku budućnost u njoj možda omogućim edit i dodavanje ili barem korištenje preko localstoragea, pa ćete onda i vi sebi olakšati život. https://sport-metadata.fly.dev"])</script><script>self.__next_f.push([1,"15:T54b,Jučer sam na Facebook stavio par iPhone fotki, a sad malo veći dump foto fotki. Konačno dan bez magle s lijepim suncem, pa sam išao vidjeti kaj se može pofotkat po tom adventu. Na žalost ne previše. Uz očekivane gužvetine i čekanje bilo čega zanimljivog da se oslobodi za fotkanje od silnih selfi manijaka i wannabe influensera, čovjek izgubi volju. Na svu sreću uz 35icu sam uzeo i veliku Sigmu pa sam sa 600mm lovio detalje gdje se pacijenti ne mogu popeti. Ove godine je majstor za svjetlo valjda bio neki penzić koji je u Jugoslaviji postavljao onu žuto/narančastu po Slavonskoj i sličnim cestama. Ili ko da su sve osvjetili stari francuski auti s onim žutim farovima. Katastrofa. I onda jedan od najljepših foto rekvizita, mjesec, stavi dole na Stross, lupe to odvratno svjetlo u njega pa svi izgledaju ko Trump i još u pozadini ti vire dizalice iz glave. Grad je sada još više u skelama, ceradama i dizalicama pa se trebalo malo i potruditi da baš svaka fotka nema \"Pozdrav s gradilišta\" u sebi, ali eto opet svi misle da mogu raditi sve pa imamo kaj imamo. Najveća sramota je i dalje Markov trg. Bor na trgu konačno izgleda bogatije, okićenije, a ne onako golo kao prije. Ponuda za žderanje i rukotvorine se također čini ljepše i bogatije, a ne kao prije dok su svi morali imati iste PIK hrenovke i vino iz tetrapaka.16:Tae8,"])</script><script>self.__next_f.push([1,"Vrijeme za skidanje prašine s koncertnog fotkanja palo je na beogradski Mortal kombat koji su nastupili u slično vrijeme kao i prošle godine, u Tvornici kulture . Kad na mail ne dobijem detalje o akreditaciji i koncertu obično sluti na neko sranje. Tako je bilo i ovaj put. Na Facebooku sam morao naći da koncert počinje u 21h, pa sam kod Tvornice bio oko 20:40 što je vremenski period uvijek dovoljan za ulazak pogotovo ako su otvorena i press vrata. No sinoć me dočekala gužva koje se baš ne sjećam koliko god pohodim koncerte. Ljudi stoje nasred Ljudevita Posavskog, zmija od cca 150-200m od ulaza i stalno dolaze novi tako da sam ja već ušao, a ogroman red je još bio vani. Na ulazu na popisu curka lagano po mobu, ja stojim, čekam, lagani smiješak, pa posprdno naravno može akreditacija. Ali fizičke akreditacije nema, čak ni one papirnate narukvice. Jedan zaštitar šalje kod drugog na pregled torbe. Neki mladi dečko na zadatku. Otvaram ruksak on gleda opremu..jaooo. Čekam da potvrdi jel mogu unutra. Pita on pa kaj ćemo. Jel vi ovdje fotkate. Ja doslovno šutim jer ne vjerujem i ne razumijem kaj me pita. Kaj jel ovdje fotkam? Ne došo sam s opremom, prošao press popis, al fotkam u Adamovcu. Pa reko nego gdje fotkam? Pa kaj nisi odmah reko da si fotograf? WTF??? Uglavnom naravno da je koncert kasnio pol sata jer se čekalo da ono ljudstvo vani uđe. Iako su iz publike dobivali poticaj \"svirajte pičke\", nije imalo smisla počinjati uz toliko ljudi vani. No sve je brzo zaboravljeno na prve taktove Alkohola , koji se pretočio u Seljačku bunu i disclaimer da su oni ovdje tjelima, ali srcem u Beogradu uz prosvjednike. Tvornica je to naravno pozdravila parolom \"Vučiću pederu\" i svirka se nastavila. Tolike koncertne pauze uzimaju danak u mojem fotkanju pa sam dosta tražio i prtljao, ali sva sreća da je bend živahan tako da je bilo dovoljno prilika za okidanje. Šofersku su naravno posvetili Mitroviću i dalje nizali hitove, ne sjećam se više kojim redom, ali bile su tu Mortal kombat , Devedesete , Da si više mrtva , Ljubavna , Mrzi me ko Nemca , Feminizam , Rijaliti ... Standardno dobra rokačina benda koji nas posjećuje od ako se ne varam 2011. kada su bili u KSET-u. https://www.youtube.com/watch?v=3ZkrQG-P1iM Inače ovaj naziv Mortal kombat i logo jako sličan originalu ili čak isti u nekim fazama me podsjetio na nedavnu pravnu zavrzlamu s logom hrvatskog nogometnog kluba treće županijske lige i Brightona. Englezi su nekako nanjušili da ovi podravski mudraci imaju njihov copy/paste logo pa su to rješili pravnim putem. NetherRealm studio vjerojatno ne prati srpsku metal/punk scenu, ali tko zna, možda su i isposlovali korištenje. Fun fact...nekad sam znao sve kombinacije za Finish him - Fatality u Mortal Kombat 2."])</script><script>self.__next_f.push([1,"17:T31c3,"])</script><script>self.__next_f.push([1,"Nedavno sam uz pomoć Rite ugasio dvije svjećice 4 i 4 na bezglutenskoj torti iz Spara koju sam nakon toga ja većinski proždrao pa mi je bilo zlo. Možda je razlog muke i to kaj su mi te godine kao klincu predstavljale duboku starost, a sad mi se tu rugaju s ove tvorničke torte. No patnje mladog Ivice nisu bitne za ovaj blog, bitno je to da sam shvatio da sam otprilike u ovo doba prije 20 godina kupio svoj prvi digitalac kojim je krenula moja ovisnost. Nisam se mogao drogirati jeftinim drogama kao ostala djeca i družiti se sa dr. Sakomanom, ne, ja sam se odlučio na skuplje droge i razne doktore s foruma, news grupa i ostalih močvarnih područja interneta. 20 godina je skoro pola mog života. Pola života ja teglim foto opremu gdje god da krenem. Dragi Lastane, jesam li ja normalan? Pa nebitno jer biti normalan je dosta rastezljiv pojam. Bitno je da je to bilo 20 godina zabave, stvaranja uspomena, druženja i da…20 godina trošenja novaca na japansko kineske proizvode koji nas čine sretnima. Nešto što je krenulo kao daj da imam nešto za okinut godišnji, završilo je kao prekrasan hobi, kao izvor zarade, kao ključ koji je otvorio vrata raznih sportskih događanja, koncertnih dvorana. Od birtije do Arene Mladost nisam provodio po kako se to tada zvalo diskotekama u koje su zalazili tzv. šminkeri nego po klupicama i koncertima. U životu nisam išao negdje plesat, ali su koncerti bili redovno na repertoaru tako da je odlazak u foto pit bio jedan prirodan nastavak. U samim počecima se nisam mogao nadati da ću ikada moći fotkati koncerte, a kamoli da će mi jedan od prvih koncerata biti James Brown u Ciboni, a predgrupa Dino Dvornik. Tada nije bilo toliko portala i mogućnosti za infiltriranje na scenu pa se moralo više rukava potezati da bi se uguralo među one prave fotiće u pitu. Ali nije bilo ni toliko fotografa, pa je to nekak funkcioniralo. No da bi redovno došao do malo većih koncerta trebao sam odraditi i one malo manje da bi se napravio neki portfolio ili barem koja fotka kojom možeš žicati akreditaciju. Malo to baca na ono kad u oglasu svi traže ljude s iskustvom, a nitko ne razmišlja kako će oni bez iskustva stvoriti to iskustvo. Za fotografiranje koncerata su tu meni poslužili razni ulični koncerti i koncerti po birtijama di ti još plate pivu da nekaj pofotkaš. Tako sam npr. napravio OK fotke Jamesa Cannona \u0026 The Sinnersa na irskom festivalu na Zrinjevcu, poslije se upoznao sa njima, još poslije ih nakon pubovskog druženja i ugostio doma i pratio po birtijama van Zagreba u kojima su svirali, a još poslije sam Jamesa fotkao u Tvornici kad je bio gost svom tati i ostatku Dublinersa na njihovom obljetničkom koncertu. Uglavnom malo po malo, pa sam dogurao i do prve Arene u kojoj mi se ukazalo božanstvo u obliku Leonarda Cohena . Poslije su tu bili uvijek aktualni Depeche Mode koji su me opet izuli iz cipela, pa sam ovjekovječio i Deep Purple, jedan od najvećih bendova ikad u Djedica Editionu. U konačnici nisam fotkao tisuću koncerata, nego sam imao luksuz biranja onog što me zanima, a to je ispalo jako dobro jer nisam svakodnevno jurio u svaki klub na svaki koncert pa u tom procesu izgorio tako da i dan danas to volim i imam želju otići na koncerte. Športnik Pepek Iako sam za sport zainteresiran kao i bivši ministar Dabro u srednjoj školi, fotografiranje sportskih aktivnosti mi je jedno od dražih. Tako sam se u ovih 20 godina svega nafotkao. Sve je krenulo s automobilizmom kojeg sam i prije pratio, a onda se proširilo na sve gdje su me pustili i za kaj sam mogao nabaviti akreditaciju. I opet kreneš s nekim sportovima na otvorenom koje nitko ne gleda, poput američkog nogometa na lokalnom igralištu, pa nekih manjih dvoranskih natjecanja, biciklizam… Onda se opet uvališ u akreditacije i odjednom si na Snježnoj kraljici, stojiš na brdu u snijegu cijeli dan i pitaš se kaj ti je to trebalo, ili juriš na Hanžek nakon posla da bi tamo stajao na kiši ostatak dana, svađaš se sa reflektorima Maksimira dok se repka bori za prolaz na svjetsko ili europsko prvenstvo ili pak Dinamo igra Ligu prvaka. Onda se malo odmoriš u nekom blatu Savrščaka dok čekaš da te vozni park Sancta Domenice izbombardira kamenjem. Drugi dan si u Areni i shvaćaš da fotkaš europsko prvenstvo u pazi sad…mačevanju. Kad se dogodi jedan od važnijih dana za hrvatski automobilizam, organiziran je WRC, dobiješ upit za službeno fotkanje, odbijaš ga zbog posla i potrebne enormne angažiranosti oko snimanja odeš civilno i snimiš drek. Fotografiranje sporta je užasno zabavno i dinamično i često nagradi sa zanimljivim fotkama. Upravo zbog tih mogućnosti dvorana, stadiona, otvorenih prostora, šuma, ulica, bude zanimljivo i drugačije i u pravilu nikad nije dosadno. Odnosno može biti dosadno ako si zadužen samo za fotkanje Dinama na Maksimiru, ali ako kao ja imaš slobodu biranja onda je zabava zajamčena. No sport je dosta tehnički zahtjevan, želiš što bolji i veći objektiv, što brži i moderniji aparat, a to sve košta, jako puno. I kako to biva baš tu se ne zarađuje previše pa se teško može pravdati najnoviji aparat i najduži objektiv. E da, može te pogoditi lopta u glavu ili opremu, može nešto doletiti s tribina, može te pogoditi kamen kojeg auto lansira ili čak i cijeli auto, može se košarkaš zaletiti u tebi dok nemoćno sjediš kod koša, ne želiš pomisliti kaj će se desiti ako disk malo krivo ode, ili ako se previše uguraš u ring sa šircem. Vremenski uvjeti poput sunca, kiše, snijega, vjetra također znaju biti zabavni. Ne, taj je skak’o i na guske i na patke Sport i koncerti su bile moje ajmo reći glavne aktivnosti, ali u biti fotkao sam skoro sve. Bezbroj puta sam jednostavno šetao gradom i na blogu izbacivao serijal Zagrebancije . Životinje u zoološkom, na livadi, u zraku, šumi su isto tema koja mi je vrlo draga. Fotkanje hrane i pića je još jedno zanimljivo polje koje sam dotakao i koje povremeno odradim iako bi se trebao tome i više posvetiti. Fotkanje interijera može biti zanimljivo pa i čak financijski. Naravno  i svemu što su napravili, ali nisam siguran da je to bio najsjajniji odabir predgrupe za ovu publiku. Za ovakav koncert po meni nije ni trebalo biti predgrupe no dečkima se baš sviralo pa su tako i nakon kako su sami rekli uobičajene zadnje stvari Crnog leptira odsvirali i još jednu stvar, pa onda i Čudnu šumu. Tako da je Bajaga ipak počeo u 21h. Njegova pojava na pozornici je naravno bila popraćena ženskom cikom iza mene, a bilo ih je stvarno svih generacija, od Momčilovog godišta do curica koje su im možda i unuke. Pozadinski video paneli se pretvaraju u svjetla nebodera i kreće Grad . Svjetlo za fotkanje odlično iako na mahove prednji plan spaljen u odnosu na pozadinu, ali trančiraj RAW pa će biti nešto. Za ovu priliku imao sam i posuđeni odličan Canon RF 15-35 f/2.8 dok je na ramenu sad već standardno od kada sam kupi R6 stara 1DX MK II sa 70-200. Nastavlja se sa Zmaj od noćaja i \"fotografskim\" stihom na koji Bajaga baca osmeh prema fotografima Nikog ne volim da sretnem Ljude gledam ko kroz kameru Mogo bi da snimim sretne Nemam nameru Zmaj od noćaja Sa druge strane jastuka nam je zadnja pjesmu u pit, ali nakon nje je krenuo Berlin i ja sam bio zaglavljen između dva topa s konfetima pa sam čekao da se to ispuca da smijem proći dalje. Doduše, bio bi zanimljiv članak \"Fotograf pogođen topom na koncertu Bajage\" . Šetao sam se malo po dvorani i lovio Marlenu , drmnuo Tekilu , uveo Red i mir i dočekao prvog gosta, legendarnog Davora Rodika koji je naravno pojačao Godine prolaze i Još te volim na pedal steelu. Puno puta sam gledao i slušao Bajagu i svaki put je atmosfera na nivou. Nema tu scena za zrušit stadion glavom od ushićenja, ali uvijek pozitivna, rasplesana i raspjevana atmosfera i tako 40 godina. Treba to znati napraviti pa i održati. Za dio te atmosfere je uvijek zadužen i gitarista Živorad Žika Milenković , Bajagin vjerni harlekin, a uz njih je naravno i veteran Saša Lokner na klavijaturama. Kako sam bio zdravstveno upitan za dolazak na koncert, tako sam se ranije pokupio jer sam uz ono čekanje već bio na rubu snage i čitam po novinama da sam dobro i napravio jer bi inače zaglavio u gužvi zbog akcije alkotestiranja koje je netko mudar odlučio napraviti i naravno izazvao prometni kaos koji nam nije dovoljan preko dana nego eto, želimo ga i subotom navečer."])</script><script>self.__next_f.push([1,"7:[\"$\",\"div\",null,{\"className\":\"min-h-screen bg-white\",\"children\":[[\"$\",\"$9\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"h-16\"}],\"children\":[\"$\",\"$L12\",null,{}]}],[\"$\",\"div\",null,{\"className\":\"mx-auto max-w-7xl px-6 py-24\",\"children\":[\"$\",\"div\",null,{\"className\":\"flex flex-col gap-12 lg:flex-row lg:gap-16\",\"children\":[[\"$\",\"main\",null,{\"className\":\"min-w-0 flex-1\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"theme-heading font-normal tracking-tight\",\"children\":\"Blog\"}],[\"$\",\"$9\",null,{\"fallback\":[\"$\",\"p\",null,{\"className\":\"mt-8 text-zinc-500\",\"children\":\"Učitavanje…\"}],\"children\":[\"$\",\"$L13\",null,{\"posts\":[{\"id\":\"aed6f85e-64b7-4f41-8372-7b3694bb049a\",\"title\":\"Sport Metadata Generator\",\"slug\":\"260110-sport-metadata-generator\",\"date\":\"2026-01-10\",\"categories\":[\"info\"],\"thumbnail\":\"/uploads/blog/2026-01-10-260110-sport-metadata-generator/featured.webp\",\"thumbnailFocus\":\"10% 25%\",\"gallery\":[],\"galleryMetadata\":{},\"featured\":true,\"status\":\"published\",\"seo\":{\"metaTitle\":\"\",\"metaDescription\":\"Web aplikacija za pomoć reportažnim fotografima u izradi popisa igrača za Photo Mechanic, Sport Metadata Generator\",\"keywords\":\"metadata generator, exif, popis igrača, photo mechanic,\"},\"bodySearchText\":\"$14\"},{\"id\":\"a6fbcfc6-8fab-4829-8bd3-c9076be67258\",\"title\":\"Zagrebancije: Advent 2025.\",\"slug\":\"251228-advent-2025\",\"date\":\"2025-12-29\",\"thumbnail\":\"/uploads/blog/2026-02-16-advent-2025/featured.webp\",\"gallery\":[\"/uploads/blog/2025-12-29-251228-advent-2025/gallery/251 013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_530.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_531.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_532.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_533.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_534.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_536.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_541.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_542.webp\":{\"title\":\"33. zagrebački maraton 2025.\"},\"/uploads/blog/2025-10-13-251013-33-zagrebacki-maraton-2025/gallery/251012-34_zagrebacki_maraton_544.webp\":{\"title\":\"33. zagrebački maraton 2025.\"}},\"featured\":false,\"status\":\"published\",\"seo\":{\"metaTitle\":\"\",\"metaDescription\":\"Fotografije 33. zagrebačkog maratona 2025. s Vlaške ulice Draškovićeve, Ribnjaka, Račkoga...\",\"keywords\":\"sport, atletika, maraton, 33 zagrebački maraton, zagreb, hrvatska, ulica, fotografije,\"},\"bodySearchText\":\"Ove godine sam se odlučio na promjenu lokacije za fotkanje zagrebačkog maratona , pa sam umjesto poteza Pimpek plac i 100m gore dole odlučio krenut prema centru, prema startu. Ta ideja je imala više loših strana. Prvo svjetlo, mračna Jurišićeva, pa izlazak prema Draškovićevoj na dio na koji piči sunce. Drugo ograde koje nisu baš neka pozadina, pa odvratne fasade i grafiti, zatvoreni dućani...grad koji izgleda post nuklearno jer valjda od Univerzijade nije rađen ozbiljniji remont. I treće je gužva koja je kod starta veća nego kad su mi do Maksimira dolazili na kapaljku. Ali imam drugačije kadrove, neke i zanimljive. Pokušavao sam dodati taj neki prepoznatljivi dio koji bi se mogao povezati sa Zagrebom, odnosno zagrebačkim maratonom pa sam imao ideju ugurati katedralu u kadar pa Petrovu crkvu, neke table i sl. ali odnos svjetlo sjena mi nije išao u prilog jer je nemoguće pravilno eksponirati. No sva sreća na Photoshopu koji sada lakše čupa svjetlo/sjenu pa se neka fotka mogla izvući na silu.\"},{\"id\":\"d8cfb918-047e-46e0-876e-1cc3486dae82\",\"title\":\"Izabela\",\"slug\":\"250905-izabela\",\"date\":\"2025-09-05\",\"categories\":[\"kucnecarolije\"],\"thumbnail\":\"/uploads/blog/2025-09-05-250905-izabela/gallery/_mg_4964.webp\",\"thumbnailFocus\":\"51% 55%\",\"gallery\":[\"/uploads/blog/2025-09-05-250905-izabela/gallery/_mg_4945.webp\",\"/uploads/blog/2025-09-05-250905-izabela/gallery/_mg_4954.webp\",\"/uploads/blog/2025-09-05-250905-izabela/gallery/_mg_4963.webp\",\"/uploads/blog/2025-09-05-250905-izabela/gallery/_mg_4964.webp\"],\"galleryMetadata\":{},\"featured\":false,\"status\":\"published\",\"seo\":{\"metaTitle\":\"\",\"metaDescription\":\"Macro fotografije grozdova izabele\",\"keywords\":\"izabela, grozd, grožđe, kapljice vode, macro, canon, fotografije,\"},\"bodySearchText\":\"Kreću berbe pa evo par prigodnih. Kažu da fotke ne mogu dočarati mirise, ali meni ovaj direktor miriše na jedno davno martinje. Miriše na 7 idiota u jednoj Argenti. Miriše na jednog koji je pobjegao iz vojske da bi se došao olešiti. Miriše na cuclanje kroz šlauf direktno z bačve. Miriše na neke preljute pljeskavice spečene u mraku. Miriše na spaljenu ekipu. Na kraju miriše i na ribanje kod frenda kojeg je naribao tata jer da di smo mi zlili to vino.\"},{\"id\":\"b079da7e-74af-479f-9255-30927caed42e\",\"title\
